name: deploy ai-service (Azure)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ["ai-service/**", "web/data/**"]

permissions:
  id-token: write   # OIDC token for Azure login — no stored cloud credentials
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Dormant until you set the repo variable DEPLOY_ENABLED=true
    if: vars.DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image (ACR cloud build)
        run: |
          az acr build \
            --registry "${{ vars.ACR_NAME }}" \
            --image "bangkit-ai-service:${{ github.sha }}" \
            --image "bangkit-ai-service:latest" \
            --file ai-service/Dockerfile \
            .

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name "${{ vars.CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ vars.ACR_NAME }}.azurecr.io/bangkit-ai-service:${{ github.sha }}"

      - name: Show app URL
        run: |
          az containerapp show \
            --name "${{ vars.CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv
