name: deploy ai-service (Azure)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ["ai-service/**", "web/data/**"]

permissions:
  id-token: write   # OIDC token for Azure login — no stored cloud credentials
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: vars.DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Build on the runner and push to ACR. (ACR Tasks cloud builds are
      # disabled on free-tier subscriptions, so we build here instead.)
      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build and push image
        env:
          IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/bangkit-ai-service
        run: |
          docker build -f ai-service/Dockerfile \
            -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name "${{ vars.CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ vars.ACR_NAME }}.azurecr.io/bangkit-ai-service:${{ github.sha }}"
          az containerapp ingress update \
            --name "${{ vars.CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --target-port 8000 --type external

      - name: Show app URL
        run: |
          az containerapp show \
            --name "${{ vars.CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv
