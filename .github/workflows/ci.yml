name: ai-service CI

on:
  push:
    paths: ["ai-service/**", "web/data/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["ai-service/**", "web/data/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Tests (incl. eval smoke)
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image (context = repo root)
        run: docker build -f ai-service/Dockerfile -t bangkit-ai-service .
